<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growtopia Pro: Lock & Farming Edition</title>
    <style>
        :root {
            --sky: #70a1ff;
            --ui-bg: rgba(0, 0, 0, 0.9);
            --stone: #7f8c8d;
            --dl: #34e7e4;
            --gl: linear-gradient(45deg, #ff0000, #00ff00, #0000ff);
        }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; user-select: none; }
        
        /* HUD */
        #hud {
            position: absolute; top: 10px; left: 10px; z-index: 100;
            background: var(--ui-bg); color: white; padding: 15px;
            border: 2px solid #fff; border-radius: 8px;
        }
        .gem-text { color: #f1c40f; font-weight: bold; font-size: 18px; }

        /* Backpack / Inventory */
        #inventory {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 5px; background: var(--ui-bg); padding: 8px;
            border-radius: 10px; border: 2px solid #fff; z-index: 100;
            max-width: 90vw; overflow-x: auto;
        }
        .slot {
            min-width: 50px; height: 50px; background: #2f3542; border: 2px solid #57606f;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; color: white; font-size: 9px; text-align: center;
        }
        .slot.active { border-color: #f1c40f; background: #57606f; }
        .slot b { font-size: 11px; display: block; }

        canvas { display: block; }
        #msg { position: absolute; top: 80px; width: 100%; text-align: center; color: #00d2d3; font-weight: bold; text-shadow: 2px 2px #000; pointer-events: none; }
    </style>
</head>
<body>

    <div id="hud">
        GEMS: <span id="gemCount" class="gem-text">0</span><br>
        DL: <span id="dlDisp">0</span> | SL: <span id="slDisp">0</span> | GL: <span id="glDisp">0</span>
    </div>

    <div id="msg"></div>

    <div id="inventory">
        <div class="slot active" onclick="sel(0, 'stone')"><b>STONE</b>Batu</div>
        <div class="slot" onclick="sel(1, 'dirt')"><b>DIRT</b>Tanah</div>
        <div class="slot" onclick="sel(2, 'seed')"><b>SEED</b>Pohon Diat</div>
        <div class="slot" onclick="sel(3, 'dl')"><b>DL</b>Diam. Lock</div>
        <div class="slot" onclick="sel(4, 'sl')"><b>SL</b>Super Lock</div>
        <div class="slot" onclick="sel(5, 'gl')" ondblclick="convertGL()"><b>GL</b>Gim Lock<br><small>(Dbl Click)</small></div>
    </div>

    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // GAME STATE
    let gems = 0;
    let inv = { dl: 0, sl: 0, gl: 5 }; // Mulai dengan 5 Gim Lock untuk tes
    let selected = 'stone';
    let world = [];
    let trees = [];
    const TILE = 40;
    const COLS = 60;
    const ROWS = 40;

    let p = {
        x: 400, y: 100, w: 30, h: 50,
        vx: 0, vy: 0, grav: 0.6, jump: 12,
        grounded: false, punch: 0, dir: 1
    };

    // GENERATE WORLD
    for(let x=0; x<COLS; x++) {
        world[x] = [];
        for(let y=0; y<ROWS; y++) {
            let type = null;
            if(y > 8) type = 'stone';
            if(y > 15) {
                type = 'stone';
                if(Math.random() < 0.02) type = 'diamond';
                if(Math.random() < 0.1) type = null; // Caves
            }
            world[x][y] = type;
        }
    }

    function sel(i, item) {
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.slot')[i].classList.add('active');
        selected = item;
    }

    function convertGL() {
        if(inv.gl > 0) {
            inv.gl--;
            inv.dl += 100;
            updateUI();
            showMsg("GL pecah menjadi 100 Diamond Lock!");
        }
    }

    function updateUI() {
        document.getElementById('gemCount').innerText = gems;
        document.getElementById('dlDisp').innerText = inv.dl;
        document.getElementById('slDisp').innerText = inv.sl;
        document.getElementById('glDisp').innerText = inv.gl;
    }

    function showMsg(txt) {
        const m = document.getElementById('msg');
        m.innerText = txt;
        setTimeout(() => m.innerText = "", 3000);
    }

    // INPUT
    const keys = {};
    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    canvas.onmousedown = e => {
        const gx = Math.floor(e.clientX / TILE);
        const gy = Math.floor((e.clientY + (p.y - canvas.height/2)) / TILE);
        
        if(!world[gx]) return;
        p.punch = 10;

        if(world[gx][gy]) {
            // Mining
            let block = world[gx][gy];
            if(block === 'stone') gems += 200;
            if(block === 'diamond') {
                gems += 15000;
                showMsg("+1 Biji Pohon Diamond!");
            }
            world[gx][gy] = null;
        } else {
            // Planting / Building
            if(selected === 'seed') {
                trees.push({x: gx, y: gy, stage: 0, timer: 0});
                world[gx][gy] = 'pohon';
            } else {
                world[gx][gy] = selected;
            }
        }
        updateUI();
    };

    function update() {
        if(keys['KeyA']) { p.vx = -5; p.dir = -1; }
        else if(keys['KeyD']) { p.vx = 5; p.dir = 1; }
        else p.vx = 0;

        if((keys['Space'] || keys['KeyW']) && p.grounded) {
            p.vy = -p.jump;
            p.grounded = false;
        }

        p.vy += p.grav;
        p.x += p.vx;
        p.y += p.vy;

        // Collision
        let gx = Math.floor((p.x + p.w/2)/TILE);
        let gy = Math.floor((p.y + p.h)/TILE);
        if(world[gx] && world[gx][gy]) {
            p.y = gy * TILE - p.h;
            p.vy = 0;
            p.grounded = true;
        } else p.grounded = false;

        // Tree Growth
        trees.forEach(t => {
            if(t.stage < 3) {
                t.timer++;
                if(t.timer > 200) { t.stage++; t.timer = 0; }
            }
        });

        if(p.punch > 0) p.punch--;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        let camY = p.y - canvas.height/2;
        if(camY < 0) camY = 0;
        ctx.translate(0, -camY);

        // Sky
        ctx.fillStyle = '#70a1ff';
        ctx.fillRect(0, 0, canvas.width, 9 * TILE);

        // Blocks
        for(let x=0; x<COLS; x++) {
            for(let y=0; y<ROWS; y++) {
                if(!world[x][y]) continue;
                let b = world[x][y];
                
                if(b === 'stone') ctx.fillStyle = '#7f8c8d';
                else if(b === 'dirt') ctx.fillStyle = '#57606f';
                else if(b === 'diamond') ctx.fillStyle = '#34e7e4';
                else if(b === 'dl') ctx.fillStyle = '#34e7e4';
                else if(b === 'sl') ctx.fillStyle = '#9b59b6';
                else if(b === 'gl') {
                    let grad = ctx.createLinearGradient(x*TILE, y*TILE, (x+1)*TILE, (y+1)*TILE);
                    grad.addColorStop(0, 'red'); grad.addColorStop(0.5, 'yellow'); grad.addColorStop(1, 'blue');
                    ctx.fillStyle = grad;
                }

                if(b !== 'pohon') {
                    ctx.fillRect(x * TILE, y * TILE, TILE-1, TILE-1);
                    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                    ctx.strokeRect(x * TILE, y * TILE, TILE, TILE);
                }
            }
        }

        // Draw Trees
        trees.forEach(t => {
            ctx.fillStyle = '#2ecc71';
            let h = (t.stage + 1) * 10;
            ctx.fillRect(t.x * TILE + 15, t.y * TILE + (TILE - h), 10, h);
            if(t.stage === 3) {
                ctx.fillStyle = '#34e7e4';
                ctx.beginPath();
                ctx.arc(t.x * TILE + 20, t.y * TILE + (TILE - h), 8, 0, Math.PI*2);
                ctx.fill();
            }
        });

        // Player
        ctx.fillStyle = '#ff6b81';
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = 'white';
        ctx.fillRect(p.x + (p.dir===1?20:5), p.y+10, 8, 8); // Mata

        // Punch Effect
        if(p.punch > 0) {
            ctx.fillStyle = 'yellow';
            ctx.fillRect(p.x + (p.dir===1?35:-15), p.y + 15, 15, 15);
        }

        ctx.restore();
        requestAnimationFrame(() => { update(); draw(); });
    }

    updateUI();
    draw();
</script>
</body>
</html>
